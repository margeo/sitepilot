[build]
  command = "npm run build"
  functions = "netlify/functions"
  publish = "dist"

[functions]
  node_bundler = "esbuild"

[functions."generate-site"]
  timeout = 60

[functions."extract-listings"]
  timeout = 60

[functions."research-business"]
  timeout = 120

[dev]
  command = "npm run dev:vite"
  port = 8888
  targetPort = 5173
