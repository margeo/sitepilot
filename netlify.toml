[build]
  command = "npm run build"
  functions = "netlify/functions"
  publish = "dist"

[functions]
  node_bundler = "esbuild"

[functions."generate-site"]
  timeout = 26

[functions."generate-status"]
  timeout = 10

[functions."extract-listings"]
  timeout = 26

[functions."research-business"]
  timeout = 26

[functions."search-businesses"]
  timeout = 26

[dev]
  command = "npm run dev:vite"
  port = 8888
  targetPort = 5173
